<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Fashion Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Urban Fashion</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Cart 🛒 <span id="cart-count">0</span></a>
  </nav>
</header>

<section class="hero">
  <h2>New Collection 2026</h2>
  <p>Trendy clothes at affordable prices</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</section>

<section class="products" id="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975922284-9c9f2b7c2d45">
    <h3>T-Shirt</h3>
    <p>₹499</p>
    <button onclick="addToCart('T-Shirt')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
    <h3>Hoodie</h3>
    <p>₹999</p>
    <button onclick="addToCart('Hoodie')">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975869018-6c6f2b0b2a7d">
    <h3>Jeans</h3>
    <p>₹1299</p>
    <button onclick="addToCart('Jeans')">Add to Cart</button>
  </div>

</section>

<footer>
  <p>© 2026 Urban Fashion Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
